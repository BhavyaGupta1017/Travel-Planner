<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Travel Planner Agent</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="overlay">

    <header>
        <h1>✈ AI Travel Planner Agent</h1>
        <p>Plan your perfect vacation with IBM Granite AI</p>
    </header>

    <div class="container">

        <form id="travelForm">

            <div class="row">

                <div class="input-box">
                    <label>Source City</label>
                    <input type="text" id="source" placeholder="Lucknow" required>
                </div>

                <div class="input-box">
                    <label>Destination</label>
                    <input type="text" id="destination" placeholder="Goa" required>
                </div>

            </div>

            <div class="row">

                <div class="input-box">
                    <label>Budget (₹)</label>
                    <input type="number" id="budget" placeholder="30000">
                </div>

                <div class="input-box">
                    <label>Days</label>
                    <input type="number" id="days" placeholder="5">
                </div>

            </div>

            <div class="row">

                <div class="input-box">
                    <label>Travellers</label>
                    <input type="number" id="travellers" placeholder="2">
                </div>

                <div class="input-box">
                    <label>Transport</label>

                    <select id="transport">

                        <option>Flight</option>
                        <option>Train</option>
                        <option>Bus</option>
                        <option>Car</option>

                    </select>

                </div>

            </div>

            <div class="row">

                <div class="input-box">

                    <label>Hotel Preference</label>

                    <select id="hotel">

                        <option>Luxury</option>
                        <option>Premium</option>
                        <option>Budget</option>

                    </select>

                </div>

                <div class="input-box">

                    <label>Travel Interest</label>

                    <select id="interest">

                        <option>Adventure</option>
                        <option>Nature</option>
                        <option>Food</option>
                        <option>Shopping</option>
                        <option>Historical</option>
                        <option>Family</option>

                    </select>

                </div>

            </div>

            <button type="submit" class="btn">
                Generate Travel Plan
            </button>

        </form>

    </div>

    <div id="loading" class="loading">
        Generating your AI travel itinerary...
    </div>

    <div class="result-card">

        <h2>Your Travel Plan</h2>

        <div id="result">
            Your itinerary will appear here.
        </div>

    </div>

</div>
<h2>Location</h2>

<iframe
id="mapFrame"
width="100%"
height="350"
style="border:0"
loading="lazy">
</iframe>
<img id="destinationImage" width="100%">

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
